<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code - Vinh Khanh Queue</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #ffd200, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 32px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    #qrcode canvas,
    #qrcode img {
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .url-box {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      word-break: break-all;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(247, 151, 30, 0.4);
    }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">🍜 Vinh Khanh Food Tour</div>
    <h1>Scan để vào hàng chờ</h1>
    <p class="subtitle">Quét mã QR bằng điện thoại để truy cập trang</p>

    <div id="qrcode"></div>

    <div class="url-box" id="url-display"></div>

    <a class="btn-download" id="download-btn" href="#" download="qrcode-vinhkhanh.png">
      ⬇ Tải về PNG
    </a>

    <div class="footer">Vinh Khanh Food Tour · Queue System</div>
  </div>

  <script>
    const url = "http://visitor-050752643680-ap-southeast-1-an.s3-website-ap-southeast-1.amazonaws.com";
    document.getElementById("url-display").textContent = url;

    const qr = new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 220,
      height: 220,
      colorDark: "#1a1a2e",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    // Setup download button
    setTimeout(() => {
      const canvas = document.querySelector("#qrcode canvas");
      if (canvas) {
        const btn = document.getElementById("download-btn");
        btn.href = canvas.toDataURL("image/png");
      }
    }, 500);
  </script>
</body>

</html>
