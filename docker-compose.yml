version: "3.8"

services:
  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vinhkhanh-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-VinhKhanhFoodTour}
      MYSQL_USER: ${MYSQL_USER:-vkapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-app}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-change-me-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vinhkhanh

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinhkhanh-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./backend/src/VinhKhanh.API/appsettings.json:/app/appsettings.json:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DOTNET_RUNNING_IN_CONTAINER: "true"
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE:-VinhKhanhFoodTour};Uid=${MYSQL_USER:-vkapp};Pwd=${MYSQL_PASSWORD:-change-me-app};CharSet=utf8mb4;"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vinhkhanh

  # ── Admin Frontend (port 5173) ───────────────────────────────────────────────
  admin-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-admin
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${ADMIN_VITE_PORT:-5173}:5173"
    volumes:
      - ./admin-frontend:/app
      - admin_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - vinhkhanh

  # ── Vendor Frontend (port 5174) ──────────────────────────────────────────────
  vendor-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-vendor
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${VENDOR_VITE_PORT:-5174}:5174"
    volumes:
      - ./vendor-frontend:/app
      - vendor_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - backend
    networks:
      - vinhkhanh

volumes:
  mysql_data:
  admin_node_modules:
  vendor_node_modules:

networks:
  vinhkhanh:
    driver: bridge
