services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinhkhanh-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    # Do not bind-mount appsettings.json: if the host file is missing, Docker creates a directory and breaks config.
    # appsettings.json is gitignored; on a fresh clone use .env (see .env.example) or bake config at build time.
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DOTNET_RUNNING_IN_CONTAINER: "true"
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-}
      Jwt__Key: ${JWT_KEY:-}
    networks:
      - vinhkhanh

  # ── Admin Frontend (port 5173) ───────────────────────────────────────────────
  admin-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-admin
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${ADMIN_VITE_PORT:-5173}:5173"
    volumes:
      - ./admin-frontend:/app
      - admin_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - vinhkhanh

  # ── Vendor Frontend (port 5174) ──────────────────────────────────────────────
  vendor-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-vendor
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${VENDOR_VITE_PORT:-5174}:5174"
    volumes:
      - ./vendor-frontend:/app
      - vendor_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - backend
    networks:
      - vinhkhanh

  # ── Visitor Frontend — public site (port 5175) ───────────────────────────────
  visitor-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-visitor
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${VISITOR_VITE_PORT:-5175}:5175"
    volumes:
      - ./visitor-frontend:/app
      - visitor_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5175"
    depends_on:
      - backend
    networks:
      - vinhkhanh

volumes:
  admin_node_modules:
  vendor_node_modules:
  visitor_node_modules:

networks:
  vinhkhanh:
    driver: bridge
