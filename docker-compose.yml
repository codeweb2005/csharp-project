version: "3.8"

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinhkhanh-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./backend/src/VinhKhanh.API/appsettings.json:/app/appsettings.json:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DOTNET_RUNNING_IN_CONTAINER: "true"
      # RDS (or any external MySQL): set RDS_HOST, MYSQL_USER, MYSQL_PASSWORD in a .env file next to this compose file on the server.
      ConnectionStrings__DefaultConnection: "Server=${RDS_HOST};Port=${RDS_PORT:-3306};Database=${MYSQL_DATABASE:-VinhKhanhFoodTour};Uid=${MYSQL_USER};Pwd=${MYSQL_PASSWORD};CharSet=utf8mb4;SslMode=${MYSQL_SSL_MODE:-Required};"
    networks:
      - vinhkhanh

  # ── Admin Frontend (port 5173) ───────────────────────────────────────────────
  admin-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-admin
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${ADMIN_VITE_PORT:-5173}:5173"
    volumes:
      - ./admin-frontend:/app
      - admin_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - vinhkhanh

  # ── Vendor Frontend (port 5174) ──────────────────────────────────────────────
  vendor-frontend:
    image: node:22-alpine
    container_name: vinhkhanh-vendor
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${VENDOR_VITE_PORT:-5174}:5174"
    volumes:
      - ./vendor-frontend:/app
      - vendor_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - backend
    networks:
      - vinhkhanh

volumes:
  admin_node_modules:
  vendor_node_modules:

networks:
  vinhkhanh:
    driver: bridge
