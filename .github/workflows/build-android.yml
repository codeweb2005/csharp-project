name: 📱 Build Android Release AAB

on:
  push:
    tags:
      - 'v*'             # trigger on version tags: v1.0, v1.1, etc.
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Display version (e.g. 1.1)'
        required: true
        default: '1.0'
      version_code:
        description: 'Integer version code (increment each release)'
        required: true
        default: '1'

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH:   mobile/VinhKhanh.Mobile

jobs:
  build-android:
    name: Build & Sign Android AAB
    runs-on: windows-latest         # MAUI Android builds work on Windows

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup .NET + MAUI workload ────────────────────────────────────────
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      # ── 3. Decode keystore from GitHub Secret ─────────────────────────────────
      - name: Decode keystore
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ env.PROJECT_PATH }}/vinhkhanh.keystore", $bytes)

      # ── 4. Build signed AAB ────────────────────────────────────────────────────
      - name: Build Android AAB
        shell: pwsh
        env:
          ANDROID_KEYSTORE:       true
          ANDROID_KEYSTORE_PATH:  vinhkhanh.keystore
          ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS:       ${{ secrets.ANDROID_KEY_PASS }}
          ANDROID_STORE_PASS:     ${{ secrets.ANDROID_STORE_PASS }}
        run: |
          $versionName = "${{ github.event.inputs.version_name || '1.0' }}"
          $versionCode = "${{ github.event.inputs.version_code || '1' }}"

          dotnet publish `
            "${{ env.PROJECT_PATH }}/VinhKhanh.Mobile.csproj" `
            -f net10.0-android `
            -c Release `
            /p:ApplicationDisplayVersion=$versionName `
            /p:ApplicationVersion=$versionCode

      # ── 5. Upload AAB artifact ─────────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: ${{ env.PROJECT_PATH }}/bin/Release/net10.0-android/publish/*.aab
          retention-days: 30

      # ── 6. Clean up keystore (don't leave secrets on runner disk) ─────────────
      - name: Clean up keystore
        if: always()
        shell: pwsh
        run: Remove-Item -Force "${{ env.PROJECT_PATH }}/vinhkhanh.keystore" -ErrorAction SilentlyContinue
