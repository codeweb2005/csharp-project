<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; background: #0f172a; }
    .vk-pin { background: transparent !important; border: none !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    /* Same stack as admin MapPicker / POIMiniMap: Leaflet 1.9.4 + OpenStreetMap tiles (no API key). */
    (function () {
      var map = null;
      var markersLayer = null;
      var userLayer = null;

      function makeIcon() {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" width="28" height="38">' +
          '<path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="#6366f1" stroke="white" stroke-width="1.2"/>' +
          '<circle cx="12" cy="12" r="4.5" fill="white"/></svg>';
        return L.divIcon({
          html: svg,
          className: 'vk-pin',
          iconSize: [28, 38],
          iconAnchor: [14, 38],
          popupAnchor: [0, -36]
        });
      }

      function ensureMap() {
        if (map) return;
        map = L.map('map', { zoomControl: true, attributionControl: true });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19
        }).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
        userLayer = L.layerGroup().addTo(map);
        map.setView([10.7553, 106.7017], 15);
      }

      function setDataFromBase64(b64, uLat, uLng) {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        var text = new TextDecoder().decode(bytes);
        setData(JSON.parse(text), uLat, uLng);
      }

      function setData(pois, uLat, uLng) {
        ensureMap();
        markersLayer.clearLayers();
        userLayer.clearLayers();
        var bounds = [];
        (pois || []).forEach(function (p) {
          var lat = p.latitude;
          var lng = p.longitude;
          if (lat == null || lng == null || isNaN(lat) || isNaN(lng)) return;
          var m = L.marker([lat, lng], { icon: makeIcon(), title: p.name || '' });
          m.on('click', function () {
            window.location.href = 'poi://' + p.id;
          });
          markersLayer.addLayer(m);
          bounds.push([lat, lng]);
        });
        if (uLat != null && uLng != null && !isNaN(uLat) && !isNaN(uLng)) {
          L.circleMarker([uLat, uLng], {
            radius: 8,
            color: '#a5b4fc',
            weight: 2,
            fillColor: '#6366f1',
            fillOpacity: 0.95
          }).addTo(userLayer);
          bounds.push([uLat, uLng]);
        }
        if (bounds.length) {
          map.fitBounds(bounds, { padding: [28, 28], maxZoom: 17 });
        } else {
          map.setView([10.7553, 106.7017], 15);
        }
      }

      window.vkTourMap = { setData: setData, setDataFromBase64: setDataFromBase64 };
    })();
  </script>
</body>
</html>
